version: '3.8'

services:
  api:
    build: .
    container_name: ecom_api
    ports:
      - '${PORT:-3001}:3000'
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY}
      - MOMO_API_URL=${MOMO_API_URL}
      - MOMO_EXCHANGE_RATE=${MOMO_EXCHANGE_RATE}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecom_network
  db:
    image: mysql:8.0
    container_name: ecom_db
    ports:
      - '${DB_PORT_MAPPING:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

networks:
  ecom_network:
